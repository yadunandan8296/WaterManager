name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          export PATH=$PWD/gradle-8.0/bin:$PATH
          echo "GRADLE_HOME=$PWD/gradle-8.0" >> $GITHUB_ENV
          echo "$PWD/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: WaterManager
        run: gradle wrapper --gradle-version 8.0

      - name: Build APK
        working-directory: WaterManager
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: WaterManager-APK
          path: WaterManager/app/build/outputs/apk/debug/app-debug.apk
